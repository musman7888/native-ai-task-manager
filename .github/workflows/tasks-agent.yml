# =============================================================================
# Tasks Agent - CI/CD Pipeline
# =============================================================================
# Triggers: Push/PR to services/tasks-agent/** on master branch
# Actions: Lint → Build → Push to GHCR
# =============================================================================

name: Tasks Agent

on:
  push:
    branches: [master]
    paths:
      - 'services/tasks-agent/**'
      - '.github/workflows/tasks-agent.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/tasks-agent/**'
      - '.github/workflows/tasks-agent.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tasks-agent

jobs:
  # ===========================================================================
  # Job 1: Lint & Validate
  # ===========================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tasks-agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Check imports (validate package structure)
        run: uv run python -c "from tasks_agent import agent, config, mcp; print('Package structure OK')"

  # ===========================================================================
  # Job 2: Build and Push
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: lint  # Only run after lint passes
    # Only push on master branch (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with 'latest' for master branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with short SHA
            type=sha,prefix=
            # Tag with version if tagged
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/tasks-agent
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
